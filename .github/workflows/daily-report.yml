name: Daily SEO Report

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch Search Console data
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: npm run seo:fetch-gsc

      - name: Fetch Bing Webmaster data
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          BING_SITE_URL: https://tools.cqzzz.top/
        run: npm run seo:fetch-bing

      - name: Analyze opportunities
        run: npm run seo:analyze

      - name: Generate report
        run: npm run seo:daily-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: seo-daily-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Publish brief to GitHub issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="SEO 每日报告（自动）"
          body=$(cat reports/daily/latest-report.md)
          # 仓库可能没有 seo 标签，先确保存在
          gh label create "seo" --color "B45309" --description "SEO 自动报告" 2>/dev/null || true
          issue=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
          if [ -n "$issue" ] && [ "$issue" != "null" ]; then
            gh issue comment "$issue" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label "seo"
          fi
