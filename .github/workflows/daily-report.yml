name: Daily SEO Report

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch Search Console data
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: npm run seo:fetch-gsc

      - name: Analyze opportunities
        run: npm run seo:analyze

      - name: Generate report
        run: npm run seo:daily-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v5
        with:
          name: seo-daily-${{ github.run_id }}
          path: reports/
          retention-days: 30
