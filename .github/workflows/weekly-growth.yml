name: Weekly Growth Plan

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  weekly-plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch and analyze
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          BING_SITE_URL: https://tools.cqzzz.top/
        run: |
          npm run seo:fetch-gsc
          npm run seo:fetch-bing
          npm run seo:keyword-hints
          npm run seo:analyze
          npm run seo:daily-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: seo-weekly-${{ github.run_id }}
          path: reports/
          retention-days: 90
