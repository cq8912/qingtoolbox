name: SEO Autopilot

on:
  schedule:
    - cron: '20 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEO_AUTOPILOT_MAX_PAGES: 2
  SEO_AUTOPILOT_MIN_IMPRESSIONS: 80
  SEO_AUTOPILOT_MAX_CTR: 0.15
  SEO_AUTOPILOT_MIN_POSITION: 4
  SEO_AUTOPILOT_MAX_POSITION: 20
  SEO_AUTOPILOT_COOLDOWN_DAYS: 7

jobs:
  autopilot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch and analyze GSC data
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          npm run seo:fetch-gsc
          npm run seo:analyze

      - name: Auto optimize pages
        run: npm run seo:auto-optimize

      - name: Validate build
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git add src/pages/tools/*.astro src/data/tools.json reports/daily/autopilot-summary.json reports/daily/autopilot-history.json
          pages=$(node -e "const fs=require('fs');const p='reports/daily/autopilot-summary.json';if(!fs.existsSync(p)){console.log('none');process.exit(0)};const j=JSON.parse(fs.readFileSync(p,'utf8'));console.log((j.pages||[]).slice(0,3).join(',' )||'none')")
          git commit -m "seo: 自动优化工具页文案 (${pages})"
          git push origin main
